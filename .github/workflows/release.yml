name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true
      - name: Test
        env:
          REDIS_ADDR: localhost:6379
        run: go test -race ./...

  binaries:
    name: Publish binaries
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            extension=""
            if [ "$os" = "windows" ]; then extension=".exe"; fi
            name="ratelimit-demo_${VERSION}_${os}_${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/ratelimit-demo${extension}" ./cmd/demo
            if [ "$os" = "windows" ]; then
              (cd dist && zip "${name}.zip" "ratelimit-demo${extension}")
            else
              tar -C dist -czf "dist/${name}.tar.gz" ratelimit-demo
            fi
            rm "dist/ratelimit-demo${extension}"
          done

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip sbom.spdx.json > checksums.txt

      - name: Attest release archives
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/* --verify-tag --generate-notes

  container:
    name: Publish container
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/distributed-api-rate-limiter:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/distributed-api-rate-limiter:latest

      - name: Attest container
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/distributed-api-rate-limiter
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
