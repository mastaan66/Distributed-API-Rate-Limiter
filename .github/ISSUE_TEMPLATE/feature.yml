name: Feature request
description: Propose a user-facing improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem is not handled today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe behavior and a possible public API.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or alternative designs were considered?

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Could this change Redis keys, semantics, or exported APIs?
