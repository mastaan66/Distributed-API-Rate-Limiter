name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report security vulnerabilities here. Follow SECURITY.md.

  - type: input
    id: version
    attributes:
      label: Version
      description: Library tag or commit SHA
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Go version, Redis version/topology, OS, and framework
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include code, policy, concurrency, and relevant configuration.
      render: go
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Remove credentials and sensitive identities.
      render: text
